; ═══════════════════════════════════════════════════════════
; NMC 智能无人机伞 — v2.0 物料适配
; ESP32-S3 (协处理器) + F4V3S PLUS (飞控) 双处理器架构
; ═══════════════════════════════════════════════════════════

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = opi
board_build.f_flash = 80000000L
board_build.flash_freq = 80m
board_build.flash_size = 32MB

build_flags =
    -O2
    -Isrc

; 排除独立诊断入口，避免多个 setup()/loop() 同时链接
build_src_filter = +<*> -<web_main.cpp> -<raw_http_main.cpp> -<i2c_scan_main.cpp>

; ═══════════════════════════════════════════════════════════
; 关键依赖库 (v2.0 — ESP32-S3 协处理器 + F4V3S 飞控)
; ═══════════════════════════════════════════════════════════
lib_deps =
    ; GPS NEO-M8N 解析
    mikalhart/TinyGPSPlus @ ^1.1.0
    ; VL53L1X ToF 激光测距
    pololu/VL53L1X @ ^1.3.1
    ; WebSocket 库
    gilmaimon/ArduinoWebsockets @ ^0.5.0
    ; ArduinoJson
    bblanchon/ArduinoJson @ ^7.0.0

    ; ─────────────────────────────────────────
    ; 手动安装 (PIO 仓库未收录):
    ;   arduino-dw3000 → https://github.com/thotro/arduino-dw3000
    ;     放入项目 lib/ 目录下
    ;
    ; 已移除依赖 (F4V3S 飞控托管):
    ;   MPU6050, BMP280 — 姿态/高度通过 MSP 协议从飞控读取
    ;   ESPAsyncWebServer — 换用 ESP32 内置 WiFi.h WebServer API
    ; ─────────────────────────────────────────

; ═══════════════════════════════════════════════════════════
; Web MVP — 仅 ESP32-S3，零硬件依赖，用于调试 Web 面板
; ═══════════════════════════════════════════════════════════
[env:esp32-s3-web-mvp]
board = esp32-s3-devkitc-1
platform = espressif32
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = opi
board_build.f_flash = 80000000L
board_build.flash_freq = 80m
board_build.flash_size = 32MB

build_flags =
    -O2
    -Isrc
    -DWEB_HTTP_ONLY

lib_deps =
    gilmaimon/ArduinoWebsockets @ ^0.5.0
    bblanchon/ArduinoJson @ ^7.0.0
    pololu/VL53L1X @ ^1.3.1
    mikalhart/TinyGPSPlus @ ^1.1.0

; 只编译 web_main.cpp + web/ + tof + gps + comm 模块
build_src_filter = +<web_main.cpp> +<web/> +<sensors/tof.cpp> +<sensors/gps.cpp> +<comm/fc_bridge.cpp> +<comm/msp.cpp>

; ═══════════════════════════════════════════════════════════
; Raw HTTP 诊断固件 — 只用 WiFi.h + WiFiServer，排除 WebServer/WebSocket/DNS
; 用于判断安卓打不开页面是 Web 栈问题，还是 AP/手机路由/板卡配置问题
; ═══════════════════════════════════════════════════════════
[env:esp32-s3-raw-http]
board = esp32-s3-devkitc-1
platform = espressif32
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = opi
board_build.f_flash = 80000000L
board_build.flash_freq = 80m
board_build.flash_size = 32MB

build_flags =
    -O2

build_src_filter = +<raw_http_main.cpp>

; ═══════════════════════════════════════════════════════════
; I2C 扫描诊断固件 — 用于快速确认 VL53L1X 是否出现在 0x29
; ═══════════════════════════════════════════════════════════
[env:esp32-s3-i2c-scan]
board = esp32-s3-devkitc-1
platform = espressif32
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = opi
board_build.f_flash = 80000000L
board_build.flash_freq = 80m
board_build.flash_size = 32MB

build_flags =
    -O2

build_src_filter = +<i2c_scan_main.cpp>

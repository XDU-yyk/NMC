platform = espressif32
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = opi
board_build.f_flash = 80000000L
board_build.flash_freq = 80m
board_build.flash_size = 32MB

build_flags =
    -O2

build_src_filter = +<i2c_scan_main.cpp>

; ═══════════════════════════════════════════════════════════
; ToF-only 诊断固件 — 只跑 VL53L1X，不启动 WiFi/GPS/Web
; ═══════════════════════════════════════════════════════════
[env:esp32-s3-tof-only]
board = esp32-s3-devkitc-1
platform = espressif32
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = opi
board_build.f_flash = 80000000L

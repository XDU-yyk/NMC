; ═══════════════════════════════════════════════════════════
; NMC 智能无人机伞 — v2.0 物料适配
; ESP32-S3 (协处理器) + F4V3S PLUS (飞控) 双处理器架构
;
; 硬件清单:
;   ESP32-S3-DevKitC-1     — 高层任务 (融合/跟随/GPS/Web)
;   F4V3S PLUS 飞控         — 底层飞行 (姿态稳定/电机/RC/BMP)
;   NEO-M8N GPS            — 室外绝对定位
;   DW3000 UWB             — 室内跟随定位
;   VL53L1X ToF             — 低空激光测距
;   OV2640 摄像头           — DVP 图传
;   MC6C 遥控器             — 6通道手动操控
; ═══════════════════════════════════════════════════════════

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.f_flash = 80000000L

; ESP32-S3 AI 向量指令集优化
build_flags =
    -O2
    -mlongcalls
    -mfix-esp32-psram-cache-issue
    -DESP32_S3_AUTO_DETECT
    -DCORE_DEBUG_LEVEL=ARDUCORE_DEBUG_NONE
    -DBOARD_HAS_PSRAM
    ; 将 src/ 加入头文件搜索路径，允许 #include "sensors/uwb.h" 风格引用
    -Isrc

; ═══════════════════════════════════════════════════════════
; 关键依赖库 (v2.0 — ESP32-S3 协处理器 + F4V3S 飞控)
; ═══════════════════════════════════════════════════════════
lib_deps =
    ; GPS NEO-M8N 解析
    mikalhart/TinyGPSPlus @ ^1.1.0
    ; VL53L1X ToF 激光测距
    pololu/VL53L1X @ ^1.3.1
    ; WebSocket 库
    gilmaimon/ArduinoWebsockets @ ^0.5.0
    ; ArduinoJson
    bblanchon/ArduinoJson @ ^7.0.0

    ; ─────────────────────────────────────────
    ; 手动安装 (PIO 仓库未收录):
    ;   arduino-dw3000 → https://github.com/thotro/arduino-dw3000
    ;     放入项目 lib/ 目录下
    ;
    ; 已移除依赖 (F4V3S 飞控托管):
    ;   MPU6050, BMP280 — 姿态/高度通过 MSP 协议从飞控读取
    ;   ESPAsyncWebServer — 换用 ESP32 内置 WiFi.h WebServer API
    ; ─────────────────────────────────────────

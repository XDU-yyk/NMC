; PlatformIO Project Configuration for ESP32-S3 Smart Drone Umbrella
; 智能无人机伞 — ESP32-S3 平台配置

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.f_flash = 80000000L

; ESP32-S3 AI 向量指令集优化
build_flags =
    -O2
    -mlongcalls
    -mfix-esp32-psram-cache-issue
    -DESP32_S3_AUTO_DETECT
    -DCORE_DEBUG_LEVEL=ARDUCORE_DEBUG_NONE
    -DBOARD_HAS_PSRAM
    ; 将 src/ 加入头文件搜索路径，允许 #include "sensors/uwb.h" 风格引用
    -Isrc

; 关键依赖库
lib_deps =
    ; IMU MPU6050
    electroniccats/MPU6050 @ ^0.6.0
    ; 气压计 BMP280
    adafruit/Adafruit BMP280 Library @ ^2.6.8
    ; WebSocket 库
    gilmaimon/ArduinoWebsockets @ ^0.5.0
    ; ArduinoJson
    bblanchon/ArduinoJson @ ^7.0.0
    ; ─────────────────────────────────────────
    ; ⚠ UWB DW3000 驱动 (arduino-dw3000) 需要手动安装:
    ;   下载 https://github.com/thotro/arduino-dw3000
    ;   放入项目 lib/ 目录下
    ; ─────────────────────────────────────────

; include/ 由 PlatformIO 自动加入包含路径，无需 lib_extra_dirs
